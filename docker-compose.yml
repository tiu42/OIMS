services:
  mysql:
    image: mysql:8.0
    container_name: oims-mysql
    environment:
      MYSQL_ROOT_PASSWORD: quangminh061104
      MYSQL_DATABASE: glocerimex
    ports:
      - "3306:3306"
    volumes:
      - oims_mysql_data:/var/lib/mysql
      - ./src/main/java/com/oims/core/database/db_init.sql:/docker-entrypoint-initdb.d/01-db_init.sql:ro
      - ./src/main/java/com/oims/core/database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pquangminh061104"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  oims_mysql_data:
